# .github/workflows/poll_pipeline.yml
#
# Runs every Monday at 9:00 AM Pacific (16:00 UTC).
#
# Jobs:
#   1. classify-polls — finds polls in Supabase with no theme, classifies via Claude Haiku
#   2. subscriber-digest — posts weekly subscriber summary to Slack
#   3. events-digest — posts weekly pending event submissions summary to Slack
#
# Poll EXTRACTION (poll_extraction.py) must be run manually from the local
# machine where the iCloud Substack HTML export lives:
#   python pipeline/poll_extraction.py --cookie "substack.sid=..." --skip-existing

name: NVF Poll Pipeline

on:
  schedule:
    # 9 AM PT on Mondays (UTC 16:00, or 17:00 during PST)
    - cron: "0 16 * * 1"

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  classify-polls:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Classify unthemed polls
        id: classify
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set +e
          OUTPUT=$(python pipeline/classify_polls.py 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"

          # Extract classified count from summary line
          CLASSIFIED=$(echo "$OUTPUT" | grep -oP '(?<=SUMMARY: )\d+(?= classified)')
          echo "classified=${CLASSIFIED:-0}" >> "$GITHUB_OUTPUT"

          # Check if first Monday of month (day 1-7)
          DAY=$(date -u +%d)
          if [ "$DAY" -le 7 ]; then
            echo "first_monday=true" >> "$GITHUB_OUTPUT"
          else
            echo "first_monday=false" >> "$GITHUB_OUTPUT"
          fi

          exit $EXIT_CODE

      - name: Slack — success
        if: success()
        run: |
          MSG="✅ NVF poll classification complete — ${{ steps.classify.outputs.classified }} polls themed"
          if [ "${{ steps.classify.outputs.first_monday }}" = "true" ]; then
            read -r -d '' REMINDER << 'EOREMINDER'

          🔔 Monthly maintenance reminder:
          STEP 1 — Run poll extraction locally:
          1. Make sure iCloud Drive is synced
          2. Refresh Substack export if needed (Settings → Exports → Request new export)
          3. Run: python pipeline/poll_extraction.py --cookie "substack.sid=..." --skip-existing

          STEP 2 — Refresh cookie (if needed):
          1. Open Safari → napavalleyfocus.substack.com (logged in as publisher)
          2. Right-click → Inspect Element → Storage → Cookies → napavalleyfocus.substack.com
          3. Find substack.sid → copy the Value
          EOREMINDER
            MSG="$MSG$REMINDER"
          fi
          PAYLOAD=$(jq -n --arg text "$MSG" '{text: $text}')
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Slack — failure
        if: failure()
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data '{"text":"❌ NVF poll classification failed — check GitHub Actions logs"}' \
            "${{ secrets.SLACK_WEBHOOK_URL }}"

  subscriber-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Post subscriber digest to Slack
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PYEOF'
          import os, json, requests
          from datetime import datetime, timedelta, timezone

          SUPABASE_URL = os.environ["SUPABASE_URL"]
          SUPABASE_KEY = os.environ["SUPABASE_KEY"]
          SLACK_WEBHOOK_URL = os.environ["SLACK_WEBHOOK_URL"]

          headers = {
              "apikey": SUPABASE_KEY,
              "Authorization": f"Bearer {SUPABASE_KEY}",
              "Content-Type": "application/json",
          }

          # Fetch all subscribers ordered by most recent first
          r = requests.get(
              f"{SUPABASE_URL}/rest/v1/napaserve_subscribers"
              f"?select=name,email,subscribed_at"
              f"&order=subscribed_at.desc",
              headers=headers,
          )
          r.raise_for_status()
          all_subs = r.json()
          total = len(all_subs)

          # Filter to last 7 days in Python
          week_ago = datetime.now(timezone.utc) - timedelta(days=7)
          new_subs = [
              s for s in all_subs
              if s.get("subscribed_at") and
              datetime.fromisoformat(s["subscribed_at"].replace("Z", "+00:00")) >= week_ago
          ]

          today = datetime.now(timezone.utc).strftime("%B %d, %Y")

          if new_subs:
              lines = []
              for s in new_subs:
                  name = s.get("name") or "(no name)"
                  email = s.get("email", "")
                  sub_date = s.get("subscribed_at", "")[:10]
                  lines.append(f"- {name} — {email} — {sub_date}")
              signups_block = "\n".join(lines)
              msg = (
                  f"\U0001f4ec NapaServe Weekly Subscribers — {today}\n"
                  f"New this week: {len(new_subs)}\n"
                  f"Total subscribers: {total}\n\n"
                  f"New signups:\n{signups_block}"
              )
          else:
              msg = (
                  f"\U0001f4ec No new NapaServe subscribers this week. "
                  f"Total: {total}"
              )

          r = requests.post(
              SLACK_WEBHOOK_URL,
              json={"text": msg},
              headers={"Content-Type": "application/json"},
          )
          r.raise_for_status()
          print(msg)
          PYEOF

  events-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: pip install requests

      - name: Post events digest to Slack
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python - <<'PYEOF'
          import os, json, requests
          from datetime import datetime, timedelta, timezone

          SUPABASE_URL = os.environ["SUPABASE_URL"]
          SUPABASE_KEY = os.environ["SUPABASE_KEY"]
          SLACK_WEBHOOK_URL = os.environ["SLACK_WEBHOOK_URL"]

          headers = {
              "apikey": SUPABASE_KEY,
              "Authorization": f"Bearer {SUPABASE_KEY}",
              "Content-Type": "application/json",
          }

          # Fetch all pending events ordered by most recent first
          r = requests.get(
              f"{SUPABASE_URL}/rest/v1/community_events"
              f"?select=title,submitted_by,organizer_contact,submitted_at"
              f"&status=eq.pending"
              f"&order=submitted_at.desc",
              headers=headers,
          )
          r.raise_for_status()
          all_pending = r.json()
          total_pending = len(all_pending)

          # Filter to last 7 days
          week_ago = datetime.now(timezone.utc) - timedelta(days=7)
          new_events = [
              e for e in all_pending
              if e.get("submitted_at") and
              datetime.fromisoformat(e["submitted_at"].replace("Z", "+00:00")) >= week_ago
          ]

          today = datetime.now(timezone.utc).strftime("%B %d, %Y")

          if new_events:
              lines = []
              for e in new_events:
                  title = e.get("title", "(untitled)")
                  name = e.get("submitted_by") or "(no name)"
                  email = e.get("organizer_contact") or "(no email)"
                  sub_date = e.get("submitted_at", "")[:10]
                  lines.append(f"- {title} — {name} — {email} — {sub_date}")
              events_block = "\n".join(lines)
              msg = (
                  f"\U0001f4c5 New Event Submissions This Week — {today}\n"
                  f"New this week: {len(new_events)}\n\n"
                  f"{events_block}\n\n"
                  f"Review and approve at napaserve.org/events\n"
                  f"Total pending (all time): {total_pending}"
              )
          else:
              msg = (
                  f"\U0001f4c5 No new event submissions this week. "
                  f"Total pending: {total_pending}"
              )

          r = requests.post(
              SLACK_WEBHOOK_URL,
              json={"text": msg},
              headers={"Content-Type": "application/json"},
          )
          r.raise_for_status()
          print(msg)
          PYEOF
